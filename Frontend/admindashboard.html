<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        display: flex;
        background: #f5f6fa;
    }

    /* Sidebar */
    .sidebar {
        width: 230px;
        height: 100vh;
        background: #1e1e2f;
        color: white;
        padding: 20px;
    }

    .sidebar h2 {
        text-align: center;
        margin-bottom: 30px;
        font-weight: 600;
        letter-spacing: 1px;
    }

    .sidebar a {
        display: block;
        padding: 12px;
        color: #cfcfe0;
        text-decoration: none;
        border-radius: 6px;
        margin-bottom: 10px;
        transition: 0.3s;
    }

    .sidebar a:hover {
        background: #34344a;
        color: white;
    }

    /* Main */
    .main {
        flex: 1;
        padding: 30px;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
    }

    .header h1 {
        font-size: 24px;
        font-weight: 600;
        color: #333;
    }

    .logout-btn {
        background: #4c6ef5;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
    }

    .logout-btn:hover {
        background: #364fc7;
    }

    /* Card */
    .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .card h3 {
        margin-bottom: 10px;
        color: #555;
    }

    /* Table */
    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    th, td {
        padding: 12px;
        text-align: left;
    }

    th {
        background: #1e1e2f;
        color: white;
    }

    tr:nth-child(even) {
        background: #f8f9fc;
    }

    .delete-btn {
        background: #fa5252;
        border: none;
        color: white;
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
    }

    .delete-btn:hover {
        background: #c92a2a;
    }
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Blog API</h2>
    <a href="#">Dashboard</a>
    <a href="#">Posts</a>
</div>

<!-- Main -->
<div class="main">

    <div class="header">
        <h1>Admin Dashboard</h1>
        <input 
  type="text"
  id="searchInput"
  placeholder="Search posts..."
  onkeyup="loadPosts()"
  style="margin-right:0; padding:10px; width:300px; margin-bottom:20px;"
/>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>

    <!-- Stats -->
    <div class="card">
        <h3>Total Posts</h3>
        <p id="postCount">0</p>
    </div>

    <!-- Table -->
    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Description</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="postsTable"></tbody>
    </table>

</div>

<script src="dashboard.js"></script>
</body>
</html>
